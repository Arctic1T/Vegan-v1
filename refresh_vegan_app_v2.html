const INGR_CATS=[
  {id:'eggplant',label:'Eggplant',emoji:'🍆'},
  {id:'chickpea',label:'Chickpea',emoji:'🫘'},
  {id:'lentil',label:'Lentils & Beans',emoji:'🫘'},
  {id:'tofu',label:'Tofu',emoji:'⬜'},
  {id:'avocado',label:'Avocado',emoji:'🥑'},
  {id:'mushroom',label:'Mushroom',emoji:'🍄'},
  {id:'spinach',label:'Spinach',emoji:'🌿'},
  {id:'potato',label:'Potato',emoji:'🥔'},
  {id:'banana',label:'Banana & Fruit',emoji:'🍌'},
  {id:'tomato',label:'Tomato',emoji:'🍅'},
  {id:'zucchini',label:'Zucchini',emoji:'🥒'},
  {id:'cauliflower',label:'Cauliflower',emoji:'🥦'},
];

const DISH_CATS=[
  {id:'curry',label:'Curries'},
  {id:'soup',label:'Soups'},
  {id:'salad',label:'Salads'},
  {id:'bowl',label:'Bowls'},
  {id:'pasta',label:'Pasta'},
  {id:'stir_fry',label:'Stir-Fry'},
  {id:'taco',label:'Tacos'},
  {id:'breakfast',label:'Breakfast'},
  {id:'dessert',label:'Desserts'},
  {id:'smoothie',label:'Smoothies'},
  {id:'snack',label:'Snacks'},
  {id:'burger',label:'Burgers'},
  {id:'sandwich',label:'Sandwiches'},
  {id:'baked',label:'Baked'},
  {id:'noodle',label:'Noodles & Ramen'},
  {id:'dip',label:'Dips & Spreads'},
  {id:'stew',label:'Stews'},
  {id:'roasted',label:'Roasted'},
  {id:'rice',label:'Rice Dishes'},
  {id:'wrap',label:'Wraps & Gyros'},
];

let mode='ingr';
let activeIngr='eggplant';
let activeDish='curry';
let searchTerm='';

function buildTabs(){
  const mt=document.getElementById('mainTabs');
  const ingrBtn=`<div class="tab ${mode==='ingr'?'active':''}" onclick="setMode('ingr')">By ingredient</div>`;
  const dishBtn=`<div class="tab ${mode==='dish'?'active':''}" onclick="setMode('dish')">By dish type</div>`;
  const searchBtn=`<div class="tab ${mode==='search'?'active':''}" onclick="setMode('search')">Search results</div>`;
  mt.innerHTML=ingrBtn+dishBtn+(searchTerm?searchBtn:'');
}

function buildSubTabs(){
  const st=document.getElementById('subTabs');
  if(mode==='ingr'){
    st.innerHTML=INGR_CATS.map(c=>`<div class="stab ${activeIngr===c.id?'active':''}" onclick="setIngr('${c.id}',this)">${c.emoji} ${c.label}</div>`).join('');
  } else if(mode==='dish'){
    st.innerHTML=DISH_CATS.map(c=>`<div class="stab ${activeDish===c.id?'active':''}" onclick="setDish('${c.id}',this)">${c.label}</div>`).join('');
  } else {
    st.innerHTML='';
  }
}

function getRecipes(){
  if(mode==='search'){
    const q=searchTerm.toLowerCase();
    return RECIPES.filter(r=>
      r.name.toLowerCase().includes(q)||
      r.tag.toLowerCase().includes(q)||
      r.ingCat.includes(q)||
      r.dishCat.includes(q)||
      r.ing.some(i=>i.n.toLowerCase().includes(q))
    );
  }
  if(mode==='ingr') return RECIPES.filter(r=>r.ingCat===activeIngr);
  if(mode==='dish') return RECIPES.filter(r=>r.dishCat===activeDish);
  return RECIPES;
}

function renderAll(){
  buildTabs(); buildSubTabs(); renderGrid2();
}

function renderGrid2(){
  const list=getRecipes();
  const g=document.getElementById('grid');
  const em=document.getElementById('empty');
  const rb=document.getElementById('rbar');
  let label='';
  if(mode==='ingr'){const c=INGR_CATS.find(x=>x.id===activeIngr);label=c?`${c.emoji} ${c.label} dishes`:''}
  if(mode==='dish'){const c=DISH_CATS.find(x=>x.id===activeDish);label=c?c.label:''}
  if(mode==='search') label=`results for "<strong>${searchTerm}</strong>"`;
  rb.innerHTML=`<strong>${list.length}</strong> recipe${list.length!==1?'s':''} ${label?'— '+label:''}`;
  if(!list.length){g.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  const bg2={eggplant:'#f3e8ff',tomato:'#fff1f2',mushroom:'#fdf4ff',chickpea:'#fef9c3',lentil:'#fce7f3',avocado:'#f0fdf4',tofu:'#fdf2f8',spinach:'#dcfce7',potato:'#fffbeb',banana:'#fef9c3',zucchini:'#f0fdf4',cauliflower:'#fdf4ff'};
  g.innerHTML=list.map(r=>`
    <div class="rcard" onclick="openD(${r.id})">
      <div class="rcard-img" style="background:${bg2[r.ingCat]||'#fdf2f8'}"><span style="font-size:3rem">${r.emoji}</span></div>
      <div class="rcard-body">
        <div class="rcard-name">${r.name}</div>
        <div class="rcard-sub">${r.tag} · ${r.time}</div>
        <div class="macros">
          <span class="mc k">${r.cal} kcal</span>
          <span class="mc p">${r.pro}g protein</span>
          <span class="mc c">${r.carb}g carbs</span>
          <span class="mc f">${r.fat}g fat</span>
        </div>
      </div>
    </div>`).join('');
}

function setMode(m){
  if(m!=='search') searchTerm='';
  mode=m; renderAll();
}
function setIngr(id){mode='ingr';activeIngr=id;renderAll();}
function setDish(id){mode='dish';activeDish=id;renderAll();}

function doSearch(){
  const q=document.getElementById('srch').value.trim();
  if(!q) return;
  searchTerm=q; mode='search'; renderAll();
}
document.getElementById('srch').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

function openD(id){
  const r=RECIPES.find(x=>x.id===id); if(!r) return;
  document.getElementById('listView').style.display='none';
  document.getElementById('mainTabs').parentElement.style.display='none';
  document.getElementById('subTabs').style.display='none';
  document.getElementById('rbar').style.display='none';
  const dv=document.getElementById('dview'); dv.classList.add('open');
  const rows=r.ing.map(i=>`<tr><td>${i.n}</td><td style="color:var(--muted)">${i.a}</td><td style="text-align:right">${i.cal}</td><td style="text-align:right">${i.pro}g</td><td style="text-align:right">${i.carb}g</td><td style="text-align:right">${i.fat}g</td></tr>`).join('');
  const steps=r.steps.map((s,i)=>`<li><div class="snum">${i+1}</div><span>${s}</span></li>`).join('');
  document.getElementById('dcard').innerHTML=`
    <div class="dhero"><div class="dem">${r.emoji}</div><h2>${r.name}</h2><span class="dtag">${r.tag} · ${r.time} · ${r.diff}</span></div>
    <div class="mbar">
      <div class="mcell"><div class="v">${r.cal}</div><div class="l">Calories</div></div>
      <div class="mcell"><div class="v">${r.pro}g</div><div class="l">Protein</div></div>
      <div class="mcell"><div class="v">${r.carb}g</div><div class="l">Carbs</div></div>
      <div class="mcell"><div class="v">${r.fat}g</div><div class="l">Fat</div></div>
    </div>
    <div class="dbody">
      <div class="stitle">Ingredients & nutrition per ingredient</div>
      <div style="overflow-x:auto"><table class="itable"><thead><tr><th>Ingredient</th><th>Amount</th><th style="text-align:right">Cal</th><th style="text-align:right">Protein</th><th style="text-align:right">Carbs</th><th style="text-align:right">Fat</th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="stitle" style="margin-top:1rem">Instructions</div>
      <ul class="slist">${steps}</ul>
    </div>`;
  dv.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeD(){
  document.getElementById('dview').classList.remove('open');
  document.getElementById('listView').style.display='';
  document.getElementById('mainTabs').parentElement.style.display='';
  document.getElementById('subTabs').style.display='';
  document.getElementById('rbar').style.display='';
}

renderAll();
</script>
